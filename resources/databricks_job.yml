resources:
  jobs:
    broadband_customer360_churn_job:
      name: broadband_customer360_churn_job

      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Workspace/Users/${workspace.current_user.userName}/01_bronze_tables

        - task_key: silver_cleaning
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Workspace/Users/${workspace.current_user.userName}/02_silver_tables

        - task_key: gold_active_new_churn
          depends_on:
            - task_key: silver_cleaning
          notebook_task:
            notebook_path: /Workspace/Users/${workspace.current_user.userName}/03_gold_active_new_churn

        - task_key: gold_customer_360
          depends_on:
            - task_key: gold_active_new_churn
          notebook_task:
            notebook_path: /Workspace/Users/${workspace.current_user.userName}/04_gold_customer_360

        - task_key: gold_churn_risk_features
          depends_on:
            - task_key: gold_customer_360
          notebook_task:
            notebook_path: /Workspace/Users/${workspace.current_user.userName}/05_gold_churn_risk_features

        - task_key: dq_monitoring
          depends_on:
            - task_key: gold_churn_risk_features
          notebook_task:
            notebook_path: /Workspace/Users/${workspace.current_user.userName}/06_dq_monitoring

        - task_key: quarantine_records
          depends_on:
            - task_key: dq_monitoring
          notebook_task:
            notebook_path: /Workspace/Users/${workspace.current_user.userName}/07_quarantine_records

        - task_key: pipeline_orchestration
          depends_on:
            - task_key: quarantine_records
          notebook_task:
            notebook_path: /Workspace/Users/${workspace.current_user.userName}/08_pipeline_orchestration